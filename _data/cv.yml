      - title: "Osiris++: hierarchical representations for robotic-enabled precision agriculture"
        authors:
          - Adam Mukuddem, Adam Speed-Andrews, Thabisa Maweni, Imannuel Nanyaro, Ritvik Sojen, Venny Hsiao and Paul Amayo
        publisher: Frontiers in Robotics and AI
        releaseDate: 2026-02-26
        url: https://www.frontiersin.org/journals/robotics-and-ai/articles/10.3389/frobt.2026.1732004/full
        summary: A flexible approach designed to allow seamless communication between robots and humans on an array of precision agriculture tasks. We validate and evaluate the performance of Osiris++ in real-world agricultural environments, demonstrating that the system can create accurate and useful scene graphs that aid in solving the assigned tasks. This paves the way for the possibility of allowing natural language instructions, including those in African languages, to be issued to robots within the agricultural sector.


